openapi: 3.0.3
info:
  title: RootWarden API
  description: |
    API REST du backend Flask de RootWarden - plateforme de gestion centralisee
    de serveurs Linux (cles SSH, mises a jour, iptables, scan CVE, supervision multi-agent).

    **Authentification** : header `X-API-KEY` obligatoire sur toutes les routes (sauf /test).
    Le frontend PHP utilise `/api_proxy.php` qui injecte la cle automatiquement.
  version: 1.13.0
  contact:
    name: RootWarden
    url: https://github.com/Timikana/rootwarden

servers:
  - url: https://localhost:5000
    description: Backend direct (dev)
  - url: /api_proxy.php
    description: Via proxy PHP (production)

tags:
  - name: Monitoring
    description: Health check, statut serveurs, versions OS, tendances CVE
  - name: SSH
    description: Deploiement cles SSH, keypair plateforme, gestion users distants
  - name: Updates
    description: Mises a jour Linux (APT), Zabbix, planification
  - name: CVE
    description: Scan de vulnerabilites, whitelist, remediation, planification
  - name: Iptables
    description: Gestion du pare-feu iptables (regles, historique, rollback)
  - name: Fail2ban
    description: Gestion Fail2ban (statut, jails, ban/unban, installation, services)
  - name: SSH Audit
    description: Audit de la configuration sshd_config (scan, fix, historique, politiques)
  - name: Admin
    description: Backups, lifecycle serveur, permissions temporaires

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Erreur description"
    Machine:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        ip: { type: string }
        port: { type: integer }
        user: { type: string }
        online_status: { type: string, enum: [ONLINE, OFFLINE, Inconnu] }
    CveFinding:
      type: object
      properties:
        cve_id: { type: string, example: "CVE-2024-1234" }
        package_name: { type: string }
        cvss_score: { type: number, format: float }
        severity: { type: string, enum: [CRITICAL, HIGH, MEDIUM, LOW, NONE] }
        summary: { type: string }
    TempPermission:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        user_name: { type: string }
        permission: { type: string }
        machine_id: { type: integer, nullable: true }
        granted_by_name: { type: string }
        reason: { type: string }
        expires_at: { type: string, format: date-time }

security:
  - ApiKeyAuth: []

paths:
  /test:
    get:
      tags: [Monitoring]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string }

  /list_machines:
    get:
      tags: [Monitoring]
      summary: Liste des machines (filtree par role)
      description: |
        Admins voient tout. Users voient uniquement les machines
        assignees dans user_machine_access. Exclut les serveurs archived.
      responses:
        '200':
          description: Liste des machines
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  machines:
                    type: array
                    items: { $ref: '#/components/schemas/Machine' }

  /server_status:
    post:
      tags: [Monitoring]
      summary: Verifie le statut online/offline d'un serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ip]
              properties:
                ip: { type: string, example: "10.0.0.1" }
                port: { type: integer, default: 22 }
      responses:
        '200':
          description: Statut du serveur
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  ip: { type: string }
                  status: { type: string, enum: [online, offline] }
        '400': { description: IP manquante, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /deploy:
    post:
      tags: [SSH]
      summary: Lance le deploiement des cles SSH
      description: |
        Execute configure_servers.py en arriere-plan.
        Verifie l'acces machine pour les users role < 2.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machines]
              properties:
                machines:
                  type: array
                  items: { type: integer }
                  example: [1, 2, 3]
      responses:
        '200': { description: Deploiement lance }
        '400': { description: Aucune machine selectionnee }
        '403': { description: Acces refuse a une machine }

  /preflight_check:
    post:
      tags: [SSH]
      summary: Verification pre-deploiement
      description: Connectivite SSH, version OS, espace disque, users manquants.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machines]
              properties:
                machines:
                  type: array
                  items: { type: integer }
      responses:
        '200':
          description: Resultats de la verification
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  users_with_keys: { type: integer }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        machine_id: { type: integer }
                        name: { type: string }
                        ssh_ok: { type: boolean }
                        auth_method: { type: string }
                        os_version: { type: string }
                        disk_free: { type: string }
                        errors: { type: array, items: { type: string } }

  /filter_servers:
    get:
      tags: [Monitoring]
      summary: Filtre les serveurs par environnement, criticite, reseau, tag
      parameters:
        - { name: environment, in: query, schema: { type: string } }
        - { name: criticality, in: query, schema: { type: string } }
        - { name: networkType, in: query, schema: { type: string } }
        - { name: tag, in: query, schema: { type: string } }
      responses:
        '200': { description: Serveurs filtres }

  /linux_version:
    post:
      tags: [Monitoring]
      summary: Version Linux distante via SSH
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Version retournee }

  /last_reboot:
    post:
      tags: [Monitoring]
      summary: Date du dernier redemarrage + indicateur reboot_required
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Date et statut reboot }

  /cve_trends:
    get:
      tags: [Monitoring]
      summary: Tendances CVE 30 jours (histogramme)
      responses:
        '200': { description: Donnees tendance par jour }

  /platform_key:
    get:
      tags: [SSH]
      summary: Cle publique Ed25519 de la plateforme
      responses:
        '200':
          description: Cle publique
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  public_key: { type: string }
        '404': { description: Keypair non generee }

  /deploy_platform_key:
    post:
      tags: [SSH]
      summary: Deploie la keypair plateforme sur des serveurs
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_ids]
              properties:
                machine_ids: { type: array, items: { type: integer } }
      responses:
        '200': { description: Deploiement termine }

  /test_platform_key:
    post:
      tags: [SSH]
      summary: Teste la connexion via keypair sur un serveur
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Test OK avec methode d'auth utilisee }

  /regenerate_platform_key:
    post:
      tags: [SSH]
      summary: Regenere la keypair Ed25519 de la plateforme
      responses:
        '200': { description: Nouvelle keypair generee }

  /deploy_service_account:
    post:
      tags: [SSH]
      summary: Deploie le compte service rootwarden (NOPASSWD sudo)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_ids]
              properties:
                machine_ids: { type: array, items: { type: integer } }
      responses:
        '200': { description: Deploiement SA termine }

  /remove_ssh_password:
    post:
      tags: [SSH]
      summary: Supprime les mots de passe SSH/root en BDD
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Mots de passe supprimes }

  /reenter_ssh_password:
    post:
      tags: [SSH]
      summary: Re-saisir les mots de passe SSH/root
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, password]
              properties:
                machine_id: { type: integer }
                password: { type: string }
                root_password: { type: string }
      responses:
        '200': { description: Mots de passe mis a jour }

  /scan_server_users:
    post:
      tags: [SSH]
      summary: Liste les utilisateurs SSH sur un serveur distant
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Liste des users avec cles SSH }

  /remove_user_keys:
    post:
      tags: [SSH]
      summary: Supprime les cles SSH d'un user distant
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, username]
              properties:
                machine_id: { type: integer }
                username: { type: string }
      responses:
        '200': { description: Cles supprimees }

  /delete_remote_user:
    post:
      tags: [SSH]
      summary: Supprime un utilisateur Linux distant
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, username]
              properties:
                machine_id: { type: integer }
                username: { type: string }
      responses:
        '200': { description: Utilisateur supprime }

  # ── Mises a jour ──────────────────────────────────────────────────────

  /update:
    post:
      tags: [Updates]
      summary: Mise a jour APT full-upgrade (streaming)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Flux text/plain streaming }

  /security_updates:
    post:
      tags: [Updates]
      summary: Mises a jour de securite uniquement (streaming)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Flux streaming }

  /dry_run_update:
    post:
      tags: [Updates]
      summary: Simulation de mise a jour (apt --dry-run)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Liste des paquets a mettre a jour }

  /pending_packages:
    post:
      tags: [Updates]
      summary: Liste des paquets en attente de mise a jour
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Paquets disponibles }

  /apt_check_lock:
    post:
      tags: [Updates]
      summary: Verifie si apt/dpkg est verrouille
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200':
          description: Statut lock
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  locked: { type: boolean }
                  details: { type: string }

  /dpkg_repair:
    post:
      tags: [Updates]
      summary: Kill apt/dpkg bloques + dpkg --configure -a
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Reparation terminee }

  /update_zabbix:
    post:
      tags: [Updates]
      summary: "[DEPRECATED] Redirige vers /supervision/zabbix/deploy"
      deprecated: true
      responses:
        '307': { description: Redirect vers /supervision/zabbix/deploy }

  /schedule_update:
    post:
      tags: [Updates]
      summary: Planifie une mise a jour periodique (cron)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, interval_minutes]
              properties:
                machine_id: { type: integer }
                interval_minutes: { type: integer, minimum: 1, maximum: 10080 }
      responses:
        '200': { description: Planification enregistree }

  /schedule_advanced_update:
    post:
      tags: [Updates]
      summary: Planification avancee MAJ (date/heure/recurrence)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, date, time, repeat]
              properties:
                machine_id: { type: integer }
                date: { type: string, format: date }
                time: { type: string, example: "03:00" }
                repeat: { type: string, enum: [none, daily, weekly, monthly] }
      responses:
        '200': { description: Planification enregistree }

  /schedule_advanced_security_update:
    post:
      tags: [Updates]
      summary: Planification avancee MAJ securite
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, date, time, repeat]
              properties:
                machine_id: { type: integer }
                date: { type: string, format: date }
                time: { type: string, example: "03:00" }
                repeat: { type: string, enum: [none, daily, weekly, monthly] }
      responses:
        '200': { description: Planification enregistree }

  /custom_update:
    post:
      tags: [Updates]
      summary: Mise a jour personnalisee (paquets specifiques + exclusions)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, method]
              properties:
                machine_id: { type: integer }
                method: { type: string, enum: [full, security, specific] }
                packages: { type: array, items: { type: string } }
                exclusions: { type: array, items: { type: string } }
      responses:
        '200': { description: Resultat de la mise a jour }

  # ── Iptables ──────────────────────────────────────────────────────────

  /iptables:
    post:
      tags: [Iptables]
      summary: Charger les regles iptables d'un serveur
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user, action]
              properties:
                server_ip: { type: string }
                ssh_user: { type: string }
                ssh_password: { type: string }
                root_password: { type: string }
                action: { type: string, enum: [get] }
      responses:
        '200': { description: Regles IPv4+IPv6 }

  /iptables-validate:
    post:
      tags: [Iptables]
      summary: Valide les regles iptables (dry-run iptables-restore --test)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user, rules_v4]
              properties:
                server_ip: { type: string }
                ssh_user: { type: string }
                rules_v4: { type: string }
                rules_v6: { type: string }
      responses:
        '200': { description: Validation OK ou erreur syntaxe }

  /iptables-apply:
    post:
      tags: [Iptables]
      summary: Applique les regles iptables sur un serveur
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user, rules_v4]
              properties:
                server_ip: { type: string }
                ssh_user: { type: string }
                rules_v4: { type: string }
                rules_v6: { type: string }
                change_reason: { type: string }
      responses:
        '200': { description: Regles appliquees }

  /iptables-restore:
    post:
      tags: [Iptables]
      summary: Restaure les regles iptables depuis la BDD
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user]
              properties:
                server_ip: { type: string }
                ssh_user: { type: string }
      responses:
        '200': { description: Regles restaurees }

  /iptables-history:
    get:
      tags: [Iptables]
      summary: Historique des modifications iptables
      parameters:
        - { name: server_id, in: query, required: true, schema: { type: integer } }
      responses:
        '200': { description: Liste historique (20 dernieres) }

  /iptables-rollback:
    post:
      tags: [Iptables]
      summary: Rollback vers une version anterieure des regles
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [history_id]
              properties:
                history_id: { type: integer }
      responses:
        '200': { description: Rollback effectue }

  # ── CVE ───────────────────────────────────────────────────────────────

  /cve_scan:
    post:
      tags: [CVE]
      summary: Scan CVE sur un ou plusieurs serveurs
      description: Retourne un flux JSON-lines (text/plain).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id:
                  oneOf:
                    - type: integer
                    - type: array
                      items: { type: integer }
                min_cvss: { type: number, default: 7.0 }
      responses:
        '200':
          description: Flux JSON-lines
          content:
            text/plain:
              schema: { type: string }

  /cve_results:
    get:
      tags: [CVE]
      summary: Resultats du dernier scan CVE
      parameters:
        - name: machine_id
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Scan et findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  scan: { type: object }
                  findings:
                    type: array
                    items: { $ref: '#/components/schemas/CveFinding' }

  /cve_schedules:
    get:
      tags: [CVE]
      summary: Liste des planifications de scans CVE
      responses:
        '200':
          description: Planifications
    post:
      tags: [CVE]
      summary: Creer une planification de scan CVE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: "Scan nightly" }
                cron_expression: { type: string, default: "0 3 * * *" }
                min_cvss: { type: number, default: 7.0 }
                target_type: { type: string, enum: [all, tag, machines], default: all }
                target_value: { type: string }
      responses:
        '200':
          description: Planification creee
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  id: { type: integer }

  /cve_scan_all:
    post:
      tags: [CVE]
      summary: Scan CVE sur TOUS les serveurs (streaming)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                min_cvss: { type: number, default: 7.0 }
                per_machine_cvss: { type: object, additionalProperties: { type: number } }
      responses:
        '200': { description: Flux JSON-lines }

  /cve_history:
    get:
      tags: [CVE]
      summary: Historique des scans CVE d'un serveur
      parameters:
        - { name: machine_id, in: query, required: true, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 10 } }
      responses:
        '200': { description: Liste des scans }

  /cve_compare:
    get:
      tags: [CVE]
      summary: Compare deux scans CVE (diff ajoutees/supprimees)
      parameters:
        - { name: machine_id, in: query, required: true, schema: { type: integer } }
      responses:
        '200': { description: CVE ajoutees et supprimees entre les 2 derniers scans }

  /cve_test_connection:
    get:
      tags: [CVE]
      summary: Teste la connexion au service OpenCVE
      responses:
        '200': { description: Connexion OK avec URL et methode d'auth }

  /cve_remediation:
    get:
      tags: [CVE]
      summary: Liste des remediations CVE en cours
      parameters:
        - { name: machine_id, in: query, schema: { type: integer } }
      responses:
        '200': { description: Remediations }
    post:
      tags: [CVE]
      summary: Creer ou mettre a jour une remediation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, cve_id, status]
              properties:
                machine_id: { type: integer }
                cve_id: { type: string }
                status: { type: string, enum: [open, in_progress, resolved] }
                assignee: { type: string }
                deadline: { type: string, format: date }
                resolution_note: { type: string }
      responses:
        '200': { description: Remediation mise a jour }

  /cve_remediation/stats:
    get:
      tags: [CVE]
      summary: Statistiques des remediations (open, in_progress, resolved, overdue)
      responses:
        '200': { description: Stats par statut }

  /cve_whitelist:
    get:
      tags: [CVE]
      summary: Liste des CVE en whitelist
      responses:
        '200': { description: Whitelist }
    post:
      tags: [CVE]
      summary: Ajouter une CVE en whitelist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cve_id, reason]
              properties:
                cve_id: { type: string, example: "CVE-2024-1234" }
                reason: { type: string }
                machine_id: { type: integer, nullable: true }
                expires_at: { type: string, format: date }
      responses:
        '200': { description: Ajoute }
        '400': { description: Champs manquants }

  /admin/backups:
    get:
      tags: [Admin]
      summary: Liste des sauvegardes BDD
      responses:
        '200':
          description: Liste
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  backups: { type: array, items: { type: string } }
    post:
      tags: [Admin]
      summary: Creer une sauvegarde BDD
      responses:
        '200':
          description: Backup cree
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  path: { type: string }

  /admin/temp_permissions:
    get:
      tags: [Admin]
      summary: Liste des permissions temporaires actives
      responses:
        '200':
          description: Permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  permissions:
                    type: array
                    items: { $ref: '#/components/schemas/TempPermission' }
    post:
      tags: [Admin]
      summary: Accorder une permission temporaire
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, permission]
              properties:
                user_id: { type: integer }
                permission: { type: string, example: "can_deploy_keys" }
                hours: { type: integer, minimum: 1, maximum: 720, default: 24 }
                machine_id: { type: integer, nullable: true }
                reason: { type: string }
      responses:
        '200': { description: Permission accordee }
        '400': { description: Champs manquants ou duree invalide }

  # ── Fail2ban ──────────────────────────────────────────────────────────────

  /fail2ban/status:
    post:
      tags: [Fail2ban]
      summary: Statut global Fail2ban sur un serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user]
              properties:
                server_ip: { type: string }
                server_port: { type: integer, default: 22 }
                ssh_user: { type: string }
                ssh_password: { type: string }
                root_password: { type: string }
      responses:
        '200':
          description: Statut retourne
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  installed: { type: boolean }
                  running: { type: boolean }
                  jails:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string, example: "sshd" }
                        currently_banned: { type: integer }
                        total_banned: { type: integer }

  /fail2ban/jail:
    post:
      tags: [Fail2ban]
      summary: Detail d'un jail (IPs bannies + config)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user, jail]
              properties:
                server_ip: { type: string }
                server_port: { type: integer, default: 22 }
                ssh_user: { type: string }
                ssh_password: { type: string }
                root_password: { type: string }
                jail: { type: string, example: "sshd" }
      responses:
        '200':
          description: Detail du jail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  jail: { type: string }
                  currently_banned: { type: integer }
                  total_banned: { type: integer }
                  banned_ips: { type: array, items: { type: string } }
                  config:
                    type: object
                    properties:
                      maxretry: { type: integer }
                      bantime: { type: integer }
                      findtime: { type: integer }

  /fail2ban/install:
    post:
      tags: [Fail2ban]
      summary: Installe fail2ban sur un serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user]
              properties:
                server_ip: { type: string }
                ssh_user: { type: string }
                ssh_password: { type: string }
                root_password: { type: string }
      responses:
        '200': { description: Installation terminee }

  /fail2ban/ban:
    post:
      tags: [Fail2ban]
      summary: Bannir une IP dans un jail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user, jail, ip]
              properties:
                server_ip: { type: string }
                ssh_user: { type: string }
                jail: { type: string, example: "sshd" }
                ip: { type: string, example: "1.2.3.4" }
      responses:
        '200': { description: IP bannie }
        '400': { description: IP ou jail invalide }

  /fail2ban/unban:
    post:
      tags: [Fail2ban]
      summary: Debannir une IP d'un jail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user, jail, ip]
              properties:
                server_ip: { type: string }
                ssh_user: { type: string }
                jail: { type: string }
                ip: { type: string }
      responses:
        '200': { description: IP debannie }

  /fail2ban/restart:
    post:
      tags: [Fail2ban]
      summary: Redemarrer le service fail2ban
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user]
              properties:
                server_ip: { type: string }
                ssh_user: { type: string }
      responses:
        '200': { description: Service redemarre }

  /fail2ban/config:
    post:
      tags: [Fail2ban]
      summary: Lire le contenu de jail.local
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user]
              properties:
                server_ip: { type: string }
                ssh_user: { type: string }
      responses:
        '200':
          description: Contenu du fichier
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  config: { type: string }

  /fail2ban/history:
    get:
      tags: [Fail2ban]
      summary: Historique des bans/unbans
      parameters:
        - name: server_id
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Liste des actions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  history:
                    type: array
                    items:
                      type: object
                      properties:
                        jail: { type: string }
                        ip_address: { type: string }
                        action: { type: string, enum: [ban, unban] }
                        performed_by: { type: string }
                        created_at: { type: string, format: date-time }

  /fail2ban/services:
    post:
      tags: [Fail2ban]
      summary: Detecter les services installes et jails disponibles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user]
              properties:
                server_ip: { type: string }
                ssh_user: { type: string }
      responses:
        '200':
          description: Services detectes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  services:
                    type: array
                    items:
                      type: object
                      properties:
                        service: { type: string, example: "apache2" }
                        installed: { type: boolean }
                        log_path: { type: string }
                        jails:
                          type: array
                          items:
                            type: object
                            properties:
                              name: { type: string }
                              available: { type: boolean }
                              enabled: { type: boolean }

  /fail2ban/enable_jail:
    post:
      tags: [Fail2ban]
      summary: Activer un jail avec configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user, jail]
              properties:
                server_ip: { type: string }
                ssh_user: { type: string }
                jail: { type: string }
                maxretry: { type: integer, default: 5 }
                bantime: { type: integer, default: 3600 }
                findtime: { type: integer, default: 600 }
      responses:
        '200': { description: Jail active }
        '400': { description: Parametres invalides }

  /fail2ban/disable_jail:
    post:
      tags: [Fail2ban]
      summary: Desactiver un jail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [server_ip, ssh_user, jail]
              properties:
                server_ip: { type: string }
                ssh_user: { type: string }
                jail: { type: string }
      responses:
        '200': { description: Jail desactive }

  /fail2ban/whitelist:
    post:
      tags: [Fail2ban]
      summary: Gerer la whitelist ignoreip (list/add/remove)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, action]
              properties:
                machine_id: { type: integer }
                action: { type: string, enum: [list, add, remove] }
                ip: { type: string }
      responses:
        '200':
          description: Liste des IPs whitelistees
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  ips: { type: array, items: { type: string } }

  /fail2ban/unban_all:
    post:
      tags: [Fail2ban]
      summary: Debannir toutes les IPs d'un jail
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, jail]
              properties:
                machine_id: { type: integer }
                jail: { type: string }
      responses:
        '200': { description: Toutes IPs debannies }

  /fail2ban/ban_all_servers:
    post:
      tags: [Fail2ban]
      summary: Bannir une IP sur tous les serveurs (admin+)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [ip, jail]
              properties:
                ip: { type: string }
                jail: { type: string, default: sshd }
      responses:
        '200':
          description: Resultats par serveur
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  results: { type: array, items: { type: object, properties: { server: { type: string }, success: { type: boolean } } } }

  /fail2ban/templates:
    get:
      tags: [Fail2ban]
      summary: Retourne les templates de config (permissif/modere/strict)
      responses:
        '200':
          description: Templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  templates: { type: object }

  /fail2ban/logs:
    post:
      tags: [Fail2ban]
      summary: Lit les dernieres lignes de /var/log/fail2ban.log
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
                lines: { type: integer, default: 50 }
      responses:
        '200':
          description: Contenu du log
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  logs: { type: string }

  /fail2ban/stats:
    get:
      tags: [Fail2ban]
      summary: Stats bans/unbans par jour (timeline)
      parameters:
        - { name: server_id, in: query, required: true, schema: { type: integer } }
        - { name: days, in: query, schema: { type: integer, default: 30 } }
      responses:
        '200':
          description: Stats par jour
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  stats: { type: array, items: { type: object, properties: { day: { type: string }, action: { type: string }, count: { type: integer } } } }

  /fail2ban/install_all:
    post:
      tags: [Fail2ban]
      summary: Installer fail2ban sur tous les serveurs sans (admin+)
      responses:
        '200':
          description: Resultats par serveur

  /fail2ban/geoip:
    post:
      tags: [Fail2ban]
      summary: Lookup GeoIP (pays) d'une IP
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [ip]
              properties:
                ip: { type: string, example: "8.8.8.8" }
      responses:
        '200':
          description: Pays et code
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  country: { type: string, example: "United States" }
                  countryCode: { type: string, example: "US" }
                  ip: { type: string }

  # ── Services (systemd) ──────────────────────────────────────────────────

  /services/list:
    post:
      tags: [Services]
      summary: Liste des services systemd
      description: Liste tous les services systemd sur un serveur avec statut, categorie et enabled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer, example: 1 }
      responses:
        '200':
          description: Liste des services
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  services:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string, example: "nginx" }
                        active: { type: string, example: "active" }
                        sub: { type: string, example: "running" }
                        unit_file_state: { type: string, example: "enabled" }
                        description: { type: string }
                        category: { type: string, example: "web" }
                        protected: { type: boolean }

  /services/status:
    post:
      tags: [Services]
      summary: Detail d'un service
      description: Retourne le statut detaille (PID, memoire, uptime, description).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, service]
              properties:
                machine_id: { type: integer, example: 1 }
                service: { type: string, example: "nginx" }
      responses:
        '200':
          description: Detail du service
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  ActiveState: { type: string, example: "active" }
                  SubState: { type: string, example: "running" }
                  MainPID: { type: string, example: "1234" }
                  MemoryCurrent: { type: string, example: "905216" }
                  Description: { type: string }

  /services/start:
    post:
      tags: [Services]
      summary: Demarrer un service
      description: Demarre un service systemd. Bloque si service protege (sshd, dbus).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, service]
              properties:
                machine_id: { type: integer, example: 1 }
                service: { type: string, example: "nginx" }
      responses:
        '200':
          description: Resultat
        '403':
          description: Service protege

  /services/stop:
    post:
      tags: [Services]
      summary: Arreter un service
      description: Arrete un service systemd. Bloque si service protege.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, service]
              properties:
                machine_id: { type: integer, example: 1 }
                service: { type: string, example: "nginx" }
      responses:
        '200':
          description: Resultat
        '403':
          description: Service protege

  /services/restart:
    post:
      tags: [Services]
      summary: Redemarrer un service
      description: Redemarre un service systemd. Bloque si service protege.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, service]
              properties:
                machine_id: { type: integer, example: 1 }
                service: { type: string, example: "nginx" }
      responses:
        '200':
          description: Resultat
        '403':
          description: Service protege

  /services/enable:
    post:
      tags: [Services]
      summary: Activer un service au boot
      description: Active un service au demarrage (systemctl enable). Bloque si protege.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, service]
              properties:
                machine_id: { type: integer, example: 1 }
                service: { type: string, example: "nginx" }
      responses:
        '200':
          description: Resultat
        '403':
          description: Service protege

  /services/disable:
    post:
      tags: [Services]
      summary: Desactiver un service au boot
      description: Desactive un service au demarrage (systemctl disable). Bloque si protege.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, service]
              properties:
                machine_id: { type: integer, example: 1 }
                service: { type: string, example: "nginx" }
      responses:
        '200':
          description: Resultat
        '403':
          description: Service protege

  /services/logs:
    post:
      tags: [Services]
      summary: Logs journalctl d'un service
      description: Lit les dernieres lignes du journal systemd (journalctl -u).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, service]
              properties:
                machine_id: { type: integer, example: 1 }
                service: { type: string, example: "nginx" }
                lines: { type: integer, example: 100, default: 50 }
      responses:
        '200':
          description: Logs du service
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  logs: { type: string }

  /exclude_user:
    post:
      tags: [Admin]
      summary: Exclure un utilisateur d'un serveur
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [user_id, machine_id]
              properties:
                user_id: { type: integer }
                machine_id: { type: integer }
      responses:
        '200': { description: Exclusion appliquee }

  # ── SSH Audit ─────────────────────────────────────────────────────────────

  /ssh_audit/scan:
    post:
      tags: [SSH Audit]
      summary: Scanner la configuration sshd_config d'un serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200':
          description: Resultat du scan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  score: { type: integer }
                  grade: { type: string }
                  findings: { type: array, items: { type: object } }

  /ssh_audit/scan_all:
    post:
      tags: [SSH Audit]
      summary: Scanner la configuration SSH de tous les serveurs
      responses:
        '200':
          description: Resultats agrégés
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  results: { type: array, items: { type: object } }

  /ssh_audit/fix:
    post:
      tags: [SSH Audit]
      summary: Corriger une directive sshd_config et recharger sshd
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, key, value]
              properties:
                machine_id: { type: integer }
                key: { type: string }
                value: { type: string }
      responses:
        '200': { description: Directive corrigee }
        '400': { description: Parametres invalides }

  /ssh_audit/config:
    post:
      tags: [SSH Audit]
      summary: Recuperer le contenu de sshd_config d'un serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200':
          description: Contenu du fichier sshd_config
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  config: { type: string }

  /ssh_audit/history:
    get:
      tags: [SSH Audit]
      summary: Historique des scans SSH d'un serveur
      parameters:
        - name: machine_id
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Liste des scans precedents
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  history: { type: array, items: { type: object } }

  /ssh_audit/fleet:
    get:
      tags: [SSH Audit]
      summary: Vue du parc - dernier score SSH de chaque serveur
      responses:
        '200':
          description: Scores par serveur
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  servers: { type: array, items: { type: object } }

  /ssh_audit/policies:
    get:
      tags: [SSH Audit]
      summary: Lister les politiques d'audit SSH
      parameters:
        - name: machine_id
          in: query
          required: false
          schema: { type: integer }
      responses:
        '200':
          description: Politiques d'exclusion par directive
    post:
      tags: [SSH Audit]
      summary: Mettre a jour une politique d'audit SSH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [directive, action]
              properties:
                machine_id: { type: integer }
                directive: { type: string }
                action: { type: string, enum: [audit, ignore] }
                reason: { type: string }
      responses:
        '200': { description: Politique mise a jour }

  /ssh-audit/save-config:
    post:
      tags: [SSH Audit]
      summary: Sauvegarder sshd_config
      description: Remplace le contenu de sshd_config (backup auto + validation sshd -t). Admin requis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, config]
              properties:
                machine_id: { type: integer }
                config: { type: string, description: "Contenu complet sshd_config" }
      responses:
        '200': { description: Config sauvegardee }
        '500': { description: Config invalide (rollback auto) }

  /ssh-audit/toggle:
    post:
      tags: [SSH Audit]
      summary: Activer/desactiver une directive
      description: Commente ou decommmente une directive dans sshd_config. Admin requis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, directive, enable]
              properties:
                machine_id: { type: integer }
                directive: { type: string, example: "X11Forwarding" }
                enable: { type: boolean }
      responses:
        '200': { description: Directive modifiee }

  /ssh-audit/backups:
    post:
      tags: [SSH Audit]
      summary: Lister les backups sshd_config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Liste des backups }

  /ssh-audit/restore:
    post:
      tags: [SSH Audit]
      summary: Restaurer un backup sshd_config
      description: Restaure un fichier backup (validation sshd -t). Admin requis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, backup_name]
              properties:
                machine_id: { type: integer }
                backup_name: { type: string, example: "sshd_config.bak.20260410120000" }
      responses:
        '200': { description: Backup restaure }

  /ssh-audit/reload:
    post:
      tags: [SSH Audit]
      summary: Recharger le service sshd
      description: Reload (ou restart) sshd pour appliquer les modifications. Admin requis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: sshd recharged }

  # ── Admin ────────────────────────────────────────────────────────────────

  /server_lifecycle:
    post:
      tags: [Admin]
      summary: Change le statut lifecycle d'un serveur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, lifecycle_status]
              properties:
                machine_id: { type: integer }
                lifecycle_status: { type: string, enum: [active, retiring, archived] }
                retire_date: { type: string, format: date }
      responses:
        '200': { description: Mis a jour }
        '400': { description: Parametres invalides }

  # ── Supervision (multi-agent) ──────────────────────────────────────────────

  /supervision/config:
    get:
      tags: [Supervision]
      summary: Recupere la configuration globale Zabbix
      responses:
        '200': { description: Configuration globale }
    post:
      tags: [Supervision]
      summary: Sauvegarde la configuration globale Zabbix
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [zabbix_server]
              properties:
                agent_type: { type: string, enum: [zabbix-agent, zabbix-agent2] }
                agent_version: { type: string, example: "7.0" }
                zabbix_server: { type: string }
                zabbix_server_active: { type: string }
                listen_port: { type: integer, default: 10050 }
                hostname_pattern: { type: string, default: "{machine.name}" }
                tls_connect: { type: string, enum: [unencrypted, psk, cert] }
                tls_accept: { type: string, enum: [unencrypted, psk, cert] }
                tls_psk_identity: { type: string }
                tls_psk_value: { type: string }
                host_metadata_template: { type: string }
                extra_config: { type: string }
      responses:
        '200': { description: Configuration sauvegardee }

  /supervision/config/{platform}:
    get:
      tags: [Supervision]
      summary: Recupere la configuration globale pour une plateforme
      parameters:
        - name: platform
          in: path
          required: true
          schema: { type: string, enum: [zabbix, centreon, prometheus, telegraf] }
      responses:
        '200': { description: Configuration plateforme }
    post:
      tags: [Supervision]
      summary: Sauvegarde la configuration pour une plateforme
      parameters:
        - name: platform
          in: path
          required: true
          schema: { type: string, enum: [zabbix, centreon, prometheus, telegraf] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hostname_pattern: { type: string }
                centreon_host: { type: string }
                centreon_port: { type: integer }
                prometheus_listen: { type: string }
                prometheus_collectors: { type: string }
                telegraf_output_url: { type: string }
                telegraf_output_token: { type: string }
                telegraf_output_org: { type: string }
                telegraf_output_bucket: { type: string }
                telegraf_inputs: { type: string }
                extra_config: { type: string }
      responses:
        '200': { description: Configuration sauvegardee }

  /supervision/{platform}/deploy:
    post:
      tags: [Supervision]
      summary: Deploie un agent sur des serveurs (streaming)
      parameters:
        - name: platform
          in: path
          required: true
          schema: { type: string, enum: [zabbix, centreon, prometheus, telegraf] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                machine_ids: { type: array, items: { type: integer } }
      responses:
        '200': { description: Flux streaming deploiement }

  /supervision/{platform}/version:
    post:
      tags: [Supervision]
      summary: Detecte la version d'un agent installe
      parameters:
        - name: platform
          in: path
          required: true
          schema: { type: string, enum: [zabbix, centreon, prometheus, telegraf] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Version detectee }

  /supervision/{platform}/uninstall:
    post:
      tags: [Supervision]
      summary: Desinstalle un agent (streaming)
      parameters:
        - name: platform
          in: path
          required: true
          schema: { type: string, enum: [zabbix, centreon, prometheus, telegraf] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Flux streaming desinstallation }

  /supervision/{platform}/reconfigure:
    post:
      tags: [Supervision]
      summary: Reconfigure un agent sans reinstaller (streaming)
      parameters:
        - name: platform
          in: path
          required: true
          schema: { type: string, enum: [zabbix, centreon, prometheus, telegraf] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                machine_ids: { type: array, items: { type: integer } }
      responses:
        '200': { description: Flux streaming reconfiguration }

  /supervision/{platform}/config/read:
    post:
      tags: [Supervision]
      summary: Lit le fichier de config agent distant
      parameters:
        - name: platform
          in: path
          required: true
          schema: { type: string, enum: [zabbix, centreon, prometheus, telegraf] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Contenu du fichier de configuration }

  /supervision/{platform}/config/save:
    post:
      tags: [Supervision]
      summary: Sauvegarde le fichier de config agent distant (backup auto + restart)
      parameters:
        - name: platform
          in: path
          required: true
          schema: { type: string, enum: [zabbix, centreon, prometheus, telegraf] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, config]
              properties:
                machine_id: { type: integer }
                config: { type: string }
      responses:
        '200': { description: Config sauvegardee et agent redemarre }

  /supervision/{platform}/backups:
    post:
      tags: [Supervision]
      summary: Liste les backups de config agent
      parameters:
        - name: platform
          in: path
          required: true
          schema: { type: string, enum: [zabbix, centreon, prometheus, telegraf] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: Liste des backups }

  /supervision/{platform}/restore:
    post:
      tags: [Supervision]
      summary: Restaure un backup de config agent
      parameters:
        - name: platform
          in: path
          required: true
          schema: { type: string, enum: [zabbix, centreon, prometheus, telegraf] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, backup_name]
              properties:
                machine_id: { type: integer }
                backup_name: { type: string }
      responses:
        '200': { description: Backup restaure }

  /supervision/agents:
    get:
      tags: [Supervision]
      summary: Liste tous les agents installes groupes par machine
      responses:
        '200': { description: Agents par machine }

  /supervision/agents/{machine_id}:
    get:
      tags: [Supervision]
      summary: Liste les agents installes sur une machine
      parameters:
        - name: machine_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Agents de la machine }

  /supervision/overrides/{machine_id}:
    get:
      tags: [Supervision]
      summary: Liste les overrides de config pour une machine
      parameters:
        - name: machine_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Overrides }
    post:
      tags: [Supervision]
      summary: Sauvegarde les overrides pour une machine
      parameters:
        - name: machine_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                overrides: { type: object }
      responses:
        '200': { description: Overrides sauvegardes }

  /supervision/machines:
    get:
      tags: [Supervision]
      summary: Liste des machines avec statut agents
      responses:
        '200': { description: Liste machines }

  # ── SSH Audit Scheduling ───────────────────────────────────────────────

  /ssh-audit/schedules:
    get:
      tags: [SSH Audit]
      summary: Liste les planifications de scans SSH Audit
      responses:
        '200': { description: Liste des planifications }
    post:
      tags: [SSH Audit]
      summary: Cree une planification de scan SSH Audit
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [cron_expression]
              properties:
                name: { type: string, example: "Scan SSH hebdo" }
                cron_expression: { type: string, example: "0 3 * * 1" }
                target_type: { type: string, enum: [all, tag, environment] }
                target_value: { type: string }
      responses:
        '200': { description: Planification creee }

  /ssh-audit/schedules/{id}:
    delete:
      tags: [SSH Audit]
      summary: Supprime une planification
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Supprimee }

  /ssh-audit/schedules/{id}/toggle:
    post:
      tags: [SSH Audit]
      summary: Active/desactive une planification
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Mise a jour }

  /ssh-audit/trends:
    get:
      tags: [SSH Audit]
      summary: Tendances des scores SSH Audit (30 derniers jours)
      parameters:
        - name: machine_id
          in: query
          required: false
          schema: { type: integer }
      responses:
        '200': { description: Scores moyens par jour }

  # ── Bashrc ─────────────────────────────────────────────────────────────

  /bashrc/users:
    get:
      tags: [Bashrc]
      summary: Liste les utilisateurs Linux et l'etat de leur .bashrc
      parameters:
        - name: machine_id
          in: query
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Liste users + etat bashrc
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  machine_id: { type: integer }
                  figlet_present: { type: boolean }
                  template_sha8: { type: string }
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        uid: { type: integer }
                        home: { type: string }
                        shell: { type: string }
                        exists: { type: boolean }
                        size: { type: integer }
                        mtime: { type: integer }
                        sha8: { type: string }
                        has_custom: { type: boolean }
                        matches_template: { type: boolean }
        '403': { description: Permission insuffisante }
        '404': { description: Machine introuvable }

  /bashrc/prerequisites:
    post:
      tags: [Bashrc]
      summary: Installe figlet sur le serveur si absent
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
      responses:
        '200': { description: figlet installe ou deja present }
        '500': { description: Echec d'installation }

  /bashrc/preview:
    post:
      tags: [Bashrc]
      summary: Retourne un diff entre le bashrc actuel et le template
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, users]
              properties:
                machine_id: { type: integer }
                users:
                  type: array
                  items: { type: string, pattern: '^[a-z_][a-z0-9_-]*$' }
                mode:
                  type: string
                  enum: [overwrite, merge]
                  default: overwrite
      responses:
        '200': { description: Diff par utilisateur }
        '400': { description: Parametres invalides }

  /bashrc/deploy:
    post:
      tags: [Bashrc]
      summary: Deploie le .bashrc standardise sur les utilisateurs selectionnes
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, users]
              properties:
                machine_id: { type: integer }
                users:
                  type: array
                  items: { type: string, pattern: '^[a-z_][a-z0-9_-]*$' }
                mode:
                  type: string
                  enum: [overwrite, merge]
                  default: overwrite
                dry_run: { type: boolean, default: false }
      responses:
        '200':
          description: Rapport par utilisateur (backup cree, syntaxe OK, skipped)
        '400': { description: Parametres invalides }

  /bashrc/restore:
    post:
      tags: [Bashrc]
      summary: Restaure le backup .bashrc.bak.* le plus recent (ou specifique)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id, user]
              properties:
                machine_id: { type: integer }
                user: { type: string, pattern: '^[a-z_][a-z0-9_-]*$' }
                backup:
                  type: string
                  description: Nom de backup optionnel, ex .bashrc.bak.20260420_143022
      responses:
        '200': { description: Backup restaure }
        '404': { description: Aucun backup dispo }

  /bashrc/backups:
    get:
      tags: [Bashrc]
      summary: Liste les backups .bashrc.bak.* pour un utilisateur
      parameters:
        - name: machine_id
          in: query
          required: true
          schema: { type: integer }
        - name: user
          in: query
          required: true
          schema: { type: string, pattern: '^[a-z_][a-z0-9_-]*$' }
      responses:
        '200':
          description: Liste des backups tries par date desc

  /bashrc/template:
    get:
      tags: [Bashrc]
      summary: Retourne le template actif depuis la BDD
      responses:
        '200':
          description: Template actif
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  name: { type: string }
                  content: { type: string }
                  sha8: { type: string }
                  lines: { type: integer }
                  bytes: { type: integer }
    post:
      tags: [Bashrc]
      summary: Sauvegarde le template (edition via UI)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string, description: Contenu brut du .bashrc, max 512 Ko }
      responses:
        '200': { description: Template sauvegarde }
        '400': { description: Contenu vide ou trop volumineux }

  # ── Graylog (rsyslog forwarding) ───────────────────────────────────────

  /graylog/config:
    get:
      tags: [Graylog]
      summary: Config serveur Graylog
      responses:
        '200': { description: Config }
    post:
      tags: [Graylog]
      summary: Sauvegarde config (host/port/protocol/TLS/rate limit)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [server_host]
              properties:
                server_host: { type: string }
                server_port: { type: integer }
                protocol: { type: string, enum: [udp, tcp, tls, relp] }
                tls_ca_path: { type: string }
                ratelimit_burst: { type: integer }
                ratelimit_interval: { type: integer }

  /graylog/servers:
    get:
      tags: [Graylog]
      summary: Liste machines + etat forwarding rsyslog

  /graylog/deploy:
    post:
      tags: [Graylog]
      summary: Installe rsyslog si absent + ecrit forward conf + push templates
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }

  /graylog/test:
    post:
      tags: [Graylog]
      summary: Envoie un logger test depuis le serveur (tag horodate)

  /graylog/uninstall:
    post:
      tags: [Graylog]
      summary: Retire les fichiers RootWarden de /etc/rsyslog.d/

  /graylog/templates:
    get:
      tags: [Graylog]
      summary: Liste les templates rsyslog (metas)
    post:
      tags: [Graylog]
      summary: Cree ou met a jour un template rsyslog
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, content]
              properties:
                name: { type: string, pattern: '^[a-zA-Z0-9_-]{1,100}$' }
                description: { type: string }
                content: { type: string }
                enabled: { type: boolean }

  /graylog/templates/{name}:
    get:
      tags: [Graylog]
      summary: Retourne un template (contenu complet)
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
    delete:
      tags: [Graylog]
      summary: Supprime un template
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }

  # ── Wazuh ──────────────────────────────────────────────────────────────

  /wazuh/config:
    get:
      tags: [Wazuh]
      summary: Config Wazuh manager (passwords masques)
    post:
      tags: [Wazuh]
      summary: Sauvegarde config manager
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [manager_ip]
              properties:
                manager_ip: { type: string }
                manager_port: { type: integer }
                registration_port: { type: integer }
                registration_password: { type: string }
                default_group: { type: string }
                agent_version: { type: string }
                enable_active_response: { type: boolean }
                api_url: { type: string }
                api_user: { type: string }
                api_password: { type: string }

  /wazuh/servers:
    get:
      tags: [Wazuh]
      summary: Liste des machines avec etat agent

  /wazuh/install:
    post:
      tags: [Wazuh]
      summary: Installe + enrole l'agent Wazuh
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
                group: { type: string }

  /wazuh/uninstall:
    post:
      tags: [Wazuh]
      summary: Desinstalle l'agent

  /wazuh/restart:
    post:
      tags: [Wazuh]
      summary: Redemarre le service wazuh-agent

  /wazuh/group:
    post:
      tags: [Wazuh]
      summary: Assigne un groupe a un agent

  /wazuh/options:
    get:
      tags: [Wazuh]
      summary: Options par serveur (FIM, AR, SCA, rootcheck)
    post:
      tags: [Wazuh]
      summary: Sauvegarde options par serveur
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [machine_id]
              properties:
                machine_id: { type: integer }
                fim_paths:
                  type: array
                  items: { type: string }
                active_response_enabled: { type: boolean }
                log_format: { type: string }
                sca_enabled: { type: boolean }
                rootcheck_enabled: { type: boolean }
                syscheck_frequency: { type: integer }

  /wazuh/rules:
    get:
      tags: [Wazuh]
      summary: Liste les rules/decoders/CDB
    post:
      tags: [Wazuh]
      summary: Cree ou sauvegarde un rule (validation xmllint si rules/decoders)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, content]
              properties:
                name: { type: string }
                rule_type: { type: string, enum: [rules, decoders, cdb] }
                content: { type: string }

  /wazuh/rules/{name}:
    get:
      tags: [Wazuh]
      summary: Retourne un rule (contenu complet)
    delete:
      tags: [Wazuh]
      summary: Supprime un rule
