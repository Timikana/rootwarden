# ================================================================
# RootWarden CI/CD Pipeline
# ================================================================
# Declencheurs : push sur main, pull requests vers main
# Etapes : lint Python + PHP, tests pytest, build Docker images
# ================================================================

name: RootWarden CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/rootwarden

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 : Lint Python (ruff — plus rapide que flake8)
  # ─────────────────────────────────────────────────────────────
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        working-directory: backend
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check backend/ || true
        # Non-bloquant pour l'instant — format progressif

  # ─────────────────────────────────────────────────────────────
  # Job 2 : Lint PHP (php -l — verifie la syntaxe)
  # ─────────────────────────────────────────────────────────────
  lint-php:
    name: Lint PHP (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: PHP syntax check
        run: |
          echo "=== Verification syntaxe PHP ==="
          errors=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file"
              errors=$((errors + 1))
            fi
          done < <(find www/ -name "*.php" -type f)
          echo "=== $errors erreur(s) de syntaxe ==="
          [ $errors -eq 0 ] || exit 1

  # ─────────────────────────────────────────────────────────────
  # Job 3 : Tests pytest (routes API backend)
  # ─────────────────────────────────────────────────────────────
  test-python:
    name: Tests pytest
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          API_KEY: test-api-key-for-ci
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=../test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: test-results
          path: test-results.xml

  # ─────────────────────────────────────────────────────────────
  # Job 4 : Build Docker images (sans push — validation only)
  # ─────────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [lint-python, lint-php, test-python]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build PHP/Apache image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./php/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}-php:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Python/Flask image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}-python:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # Job 5 : Scan securite images Docker (Trivy)
  # ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build PHP image for scan
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./php/Dockerfile
          push: false
          load: true
          tags: rootwarden-php:scan
          cache-from: type=gha

      - name: Build Python image for scan
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: rootwarden-python:scan
          cache-from: type=gha

      - name: Scan PHP image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rootwarden-php:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan Python image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rootwarden-python:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ─────────────────────────────────────────────────────────────
  # Job 6 : Tag version automatique (depuis version.txt)
  # ─────────────────────────────────────────────────────────────
  auto-tag:
    name: Auto tag version
    runs-on: ubuntu-latest
    needs: [build-docker, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat www/version.txt 2>/dev/null || echo "0.0.0")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version detected: v${VERSION}"

      - name: Check if tag exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
          echo "Tag ${{ steps.version.outputs.version }} created"
