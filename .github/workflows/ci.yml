# ================================================================
# RootWarden CI/CD Pipeline
# ================================================================
# Declencheurs : push sur main, pull requests vers main
# Etapes : lint Python + PHP, tests pytest, build Docker images
# ================================================================

name: RootWarden CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/rootwarden

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 : Lint Python (ruff - plus rapide que flake8)
  # ─────────────────────────────────────────────────────────────
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        working-directory: backend
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check backend/ || true
        # Non-bloquant pour l'instant - format progressif

  # ─────────────────────────────────────────────────────────────
  # Job 2 : Lint PHP (php -l - verifie la syntaxe)
  # ─────────────────────────────────────────────────────────────
  lint-php:
    name: Lint PHP (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: PHP syntax check
        run: |
          echo "=== Verification syntaxe PHP ==="
          errors=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file"
              errors=$((errors + 1))
            fi
          done < <(find www/ -name "*.php" -type f)
          echo "=== $errors erreur(s) de syntaxe ==="
          [ $errors -eq 0 ] || exit 1

  # ─────────────────────────────────────────────────────────────
  # Job 3 : Tests pytest (routes API backend)
  # ─────────────────────────────────────────────────────────────
  test-python:
    name: Tests pytest
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          API_KEY: test-api-key-for-ci
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=../test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ─────────────────────────────────────────────────────────────
  # Job 4 : Build Docker images (sans push - validation only)
  # ─────────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [lint-python, lint-php, test-python]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build PHP/Apache image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./php/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}-php:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Python/Flask image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}-python:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # Job 4.1 : Gitleaks - detection de secrets commit (API keys, tokens)
  # ─────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history pour scanner tous les commits
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2 (pinned 2026-04-25)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Si le repo n'a pas de config, gitleaks utilise sa baseline par defaut
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

  # ─────────────────────────────────────────────────────────────
  # Job 4.2 : Bandit - SAST Python (SQL inj, shell inj, hardcoded secrets)
  # ─────────────────────────────────────────────────────────────
  sast-python:
    name: SAST Python (bandit)
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        working-directory: backend
        # -ll = low severity minimum, -ii = medium confidence minimum
        # Exclut les repertoires de tests (faux-positifs frequents)
        # Bloquant sur PR ET main depuis v1.17.0 (review securite). Allowlist
        # via bandit.yml si bruit, plutot que de laisser passer silencieusement.
        run: bandit -r . -ll -ii -c bandit.yml --exclude ./tests,./__pycache__ --format txt

  # ─────────────────────────────────────────────────────────────
  # Job 4.2.1 : Semgrep - SAST cross-langue (PHP + JS + Python + Docker)
  # Couvre ce que bandit rate : XSS PHP, prototype pollution JS, OWASP Top 10
  # generique. Ruleset auto = config OWASP + CWE par defaut.
  # ─────────────────────────────────────────────────────────────
  sast-semgrep:
    name: SAST cross-langue (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install semgrep
        run: pip install semgrep
      - name: Run semgrep
        # --config=auto recupere les regles OWASP/CWE pour les langages detectes.
        # --error fail si findings >= ERROR severity (bloquant). WARNING/INFO
        # restent visibles mais non bloquants.
        # --metrics=off pour ne pas envoyer de telemetrie a Semgrep Inc.
        # Allowlist : .semgrepignore (cree si bruit, pattern .gitignore-like).
        run: semgrep --config=auto --error --metrics=off --severity=ERROR .

  # ─────────────────────────────────────────────────────────────
  # Job 4.3 : SCA Python (safety + pip-audit - CVE sur dependencies)
  # ─────────────────────────────────────────────────────────────
  sca-python:
    name: SCA Python (pip-audit)
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit on requirements
        working-directory: backend
        # Scan du requirements.txt fige. --strict = fail si CVE detectee.
        # Bloquant sur PR ET main depuis v1.17.0 (review securite).
        run: pip-audit -r requirements.txt --desc --strict

  # ─────────────────────────────────────────────────────────────
  # Job 4.4 : SCA PHP (composer audit - CVE sur dependances Composer)
  # ─────────────────────────────────────────────────────────────
  sca-php:
    name: SCA PHP (composer audit)
    runs-on: ubuntu-latest
    needs: lint-php
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
      - name: Composer install (sans scripts pour eviter hooks arbitraires)
        working-directory: www
        run: composer install --no-scripts --no-interaction --no-progress
      - name: Composer audit
        working-directory: www
        # --locked force le scan des versions exactes pinnees dans composer.lock
        # --format=plain pour output GitHub-friendly
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            composer audit --locked --format=plain || true
          else
            composer audit --locked --format=plain
          fi

  # ─────────────────────────────────────────────────────────────
  # Job 4.5 : Trivy fs - scan vulnerabilites au niveau du repo
  # (complement au scan des images Docker plus bas)
  # ─────────────────────────────────────────────────────────────
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Trivy fs (requirements + composer + misconfig IaC)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # Scanne : requirements.txt, composer.lock, Dockerfiles, docker-compose.yml
          scanners: vuln,secret,misconfig

  # ─────────────────────────────────────────────────────────────
  # Job 5 : Scan securite images Docker (Trivy)
  # ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build PHP image for scan
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./php/Dockerfile
          push: false
          load: true
          tags: rootwarden-php:scan
          cache-from: type=gha

      - name: Build Python image for scan
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: rootwarden-python:scan
          cache-from: type=gha

      - name: Scan PHP image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: rootwarden-php:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan Python image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: rootwarden-python:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ─────────────────────────────────────────────────────────────
  # Job 6 : Tag version automatique (depuis version.txt)
  # ─────────────────────────────────────────────────────────────
  auto-tag:
    name: Auto tag version
    runs-on: ubuntu-latest
    needs: [build-docker, security-scan, secrets-scan, sast-python, sast-semgrep, sca-python, sca-php, trivy-fs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat www/version.txt 2>/dev/null || echo "0.0.0")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version detected: v${VERSION}"

      - name: Check if tag exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
          echo "Tag ${{ steps.version.outputs.version }} created"
