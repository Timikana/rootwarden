# =============================================================================
# apache-config.conf — Configuration Apache STATIQUE (version legacy)
# =============================================================================
#
# STATUT : LEGACY — conservé pour compatibilité, non utilisé en production.
#
# Historique :
#   Ce fichier était l'ancienne configuration Apache, copiée directement dans
#   le conteneur et chargée par Apache. Il a été remplacé par le système de
#   templates dynamiques (apache-ssl.conf.tmpl / apache-http.conf.tmpl) géré
#   par entrypoint.sh, qui permet de choisir le mode SSL au démarrage via
#   la variable d'environnement SSL_MODE.
#
# Pourquoi il est conservé :
#   - Référence pour comprendre la configuration historique du projet
#   - Repli possible si le mécanisme entrypoint.sh est désactivé
#   - Contient un exemple de Content Security Policy (CSP) commenté,
#     utile comme point de départ pour une future activation
#
# Ce fichier n'est PAS copié dans le Dockerfile actuel et n'est donc
# pas actif dans le conteneur. Pour le réactiver, il faudrait ajouter :
#   COPY php/apache-config.conf /etc/apache2/sites-available/000-default.conf
# =============================================================================


# ── VirtualHost HTTP (port 80) — Redirection vers HTTPS ───────────────────────
# En mode legacy, ce bloc redirige tout le trafic HTTP vers HTTPS (301).
<VirtualHost *:80>
    # Nom de domaine du serveur — était injecté via les envvars Apache
    ServerName ${SERVER_NAME}
    # Email administrateur affiché dans les pages d'erreur
    ServerAdmin ${SERVER_ADMIN}
    # Racine des sources PHP
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    # Redirection automatique HTTP → HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/?(.*) https://%{HTTP_HOST}/$1 [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>


# ── VirtualHost HTTPS (port 443) ──────────────────────────────────────────────
# Bloc principal de l'ancienne configuration SSL.
# Dans la version legacy, les chemins des certificats étaient codés en dur
# (basés sur ${SERVER_NAME}) plutôt qu'injectés via SSL_CERT_PATH / SSL_KEY_PATH.
<VirtualHost *:443>
    ServerName ${SERVER_NAME}
    ServerAdmin ${SERVER_ADMIN}
    DocumentRoot /var/www/html

    # Activation SSL — nécessite le module ssl (a2enmod ssl)
    SSLEngine on
    # Chemins en dur vers les certificats (ancienne approche, remplacée par les variables
    # SSL_CERT_PATH et SSL_KEY_PATH dans les templates dynamiques actuels)
    SSLCertificateFile /var/www/certs/${SERVER_NAME}.crt
    SSLCertificateKeyFile /var/www/certs/${SERVER_NAME}.pem

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    # ── Headers de sécurité ──────────────────────────────────────────────────
    <IfModule mod_headers.c>
        # HSTS : force HTTPS pour ce domaine pendant 1 an (31 536 000 secondes)
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"

        # Anti sniff : empêche la détection automatique du type MIME par le navigateur
        Header always set X-Content-Type-Options "nosniff"

        # Anti frames : bloque l'affichage dans des iframes (protection clickjacking)
        Header always set X-Frame-Options "DENY"

        # Politique Referrer : envoie l'origine seule vers les domaines externes
        # (l'option "no-referrer" ci-dessous est plus stricte mais casse certains outils)
        # Header always set Referrer-Policy "no-referrer"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"


        # ----------- Content Security Policy (CSP) — DÉSACTIVÉE -----------
        # Exemple de CSP restrictive prête à l'emploi. Décommenter et adapter
        # selon les besoins de l'application (CDN utilisés, scripts inline, etc.).
        # Avertissement : un nonce statique (comme ci-dessous) est moins sécurisé
        # qu'un nonce dynamique généré par requête — à considérer avant activation.
        #Header always set Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.tailwindcss.com 'nonce-89695c7f0439373f93eb5d7e96df1e68337f8b85185c2dfaca35e1b389425ac5'; style-src 'self'; object-src 'none';"
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
