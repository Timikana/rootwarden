; =============================================================================
; php.ini — Surcharges PHP pour RootWarden (conteneur Docker)
; =============================================================================
;
; Ce fichier remplace la configuration PHP par défaut de l'image php:8.4-apache.
; Il est copié dans /usr/local/etc/php/php.ini par le Dockerfile.
;
; Objectifs des surcharges :
;   - Sécurité : masquer la version PHP, restreindre les fonctions dangereuses,
;     protéger les cookies de session contre le vol et le cross-site scripting
;   - Performance : activer OPcache, ajuster les limites mémoire et de buffering
;   - Compatibilité projet : upload de clés SSH (fichiers potentiellement > 8M),
;     sessions persistantes sur le système de fichiers plutôt qu'en mémoire
; =============================================================================


; ==========================
; PHP General Configuration
; ==========================

[PHP]
; Activer le moteur PHP (toujours On en production)
engine = On

; Désactiver les balises courtes <? ... ?> — seules <?php ... ?> sont acceptées.
; Bonne pratique : évite les ambiguïtés avec XML et améliore la lisibilité.
short_open_tag = Off

; Précision des nombres flottants dans les conversions en chaîne (14 chiffres significatifs)
precision = 14

; Taille du buffer de sortie en octets. 4096 est un bon compromis performance/mémoire.
; Permet à PHP d'envoyer les headers après avoir commencé à générer la page.
output_buffering = 4096

; Désactivation de la compression zlib à la volée — on délègue à Apache ou au proxy.
zlib.output_compression = Off

; Désactiver le flush automatique après chaque sortie (économise des appels système)
implicit_flush = Off

; Précision maximale pour la sérialisation des flottants (-1 = précision native IEEE 754)
serialize_precision = -1


; ==========================
; Error Handling and Logging
; ==========================

; Activer l'écriture des erreurs dans le fichier de log (indispensable en production)
log_errors = On

; Niveau de rapport d'erreurs : toutes les erreurs sauf les dépréciations et les strictes.
; En développement, on peut passer à E_ALL pour voir les dépréciations.
; E_STRICT est supprime en PHP 8.4 — inutile de le masquer.
error_reporting = E_ALL & ~E_DEPRECATED

; Fichier de log PHP — créé et rendu accessible à Apache dans le Dockerfile
error_log = /var/log/php_errors.log

; Affichage des erreurs dans le navigateur — utile en développement.
; IMPORTANT : passer à Off en production pour ne pas exposer des informations sensibles.
display_errors = Off
display_startup_errors = Off

; Formater les erreurs en HTML (lisible dans le navigateur en mode développement)
html_errors = On


; ==========================
; Timezone
; ==========================

; Timezone par défaut pour toutes les fonctions de date/heure PHP.
; Doit correspondre à la variable TZ du conteneur et au paramètre système.
date.timezone = Europe/Paris


; ==========================
; Session Configuration
; ==========================
; La gestion des sessions est critique pour la sécurité de RootWarden :
; les sessions stockent l'état d'authentification et les tokens TOTP.

[Session]
; Stockage des sessions sur le système de fichiers plutôt qu'en mémoire.
; Le dossier /var/www/sessions est créé par le Dockerfile avec les bonnes permissions.
session.save_path = "/var/www/sessions"

; Utiliser uniquement des cookies pour transporter l'identifiant de session.
; Empêche la transmission du session ID dans les URLs (protection contre le session hijacking).
session.use_cookies = 1
session.use_only_cookies = 1

; Marquer le cookie de session comme "Secure" — il ne sera envoyé que sur HTTPS.
; Indispensable en production pour empêcher l'interception du cookie en clair.
; (En développement HTTP pur, passer temporairement à 0)
session.cookie_secure = 1 ; Passez à 1 si HTTPS est activé

; Marquer le cookie de session comme "HttpOnly" — inaccessible depuis JavaScript.
; Protège contre le vol de session via XSS.
session.cookie_httponly = 1

; Politique SameSite du cookie de session.
; "Strict" : le cookie n'est jamais envoyé dans les requêtes cross-site (protection CSRF maximale).
session.cookie_samesite = "Strict"

; Durée de vie maximale d'une session inactive (en secondes). 3600 = 1 heure.
; Après ce délai, le Garbage Collector peut supprimer le fichier de session.
session.gc_maxlifetime = 3600

; Probabilité d'exécution du Garbage Collector à chaque requête : gc_probability / gc_divisor = 1%.
; Valeur raisonnable pour ne pas impacter les performances tout en nettoyant régulièrement.
session.gc_probability = 1
session.gc_divisor = 100

; Désactiver le démarrage automatique de session à chaque requête.
; Les sessions sont démarrées explicitement via session_start() dans le code PHP.
session.auto_start = 0

; Nom du cookie de session envoyé au navigateur
session.name = PHPSESSID

; Durée de vie du cookie de session dans le navigateur (0 = jusqu'à fermeture du navigateur).
; Combiné avec gc_maxlifetime, garantit que la session expire côté serveur ET client.
session.cookie_lifetime = 0


; ==========================
; File Uploads
; ==========================
; RootWarden permet l'import de clés SSH et potentiellement d'autres fichiers.
; Les limites sont augmentées par rapport aux valeurs par défaut PHP (2M / 8M).

[file_uploads]
; Activer la gestion des uploads de fichiers
file_uploads = On

; Taille maximale d'un fichier uploadé — 50M pour accommoder les archives de clés
upload_max_filesize = 50M

; Taille maximale des données POST (doit être >= upload_max_filesize)
; Inclut tous les champs du formulaire en plus des fichiers uploadés.
post_max_size = 50M


; ==========================
; Memory and Execution Limits
; ==========================
; Limites ajustées pour les opérations RootWarden (crypto, gestion de clés SSH...).

[Resource Limits]
; Mémoire maximale allouée par requête PHP.
; 256M est généreux mais nécessaire pour les opérations de chiffrement sodium et les imports.
memory_limit = 256M

; Temps d'exécution maximum par requête (en secondes).
; 30s est suffisant pour les opérations courantes — augmenter uniquement si nécessaire.
max_execution_time = 30

; Temps maximum pour parser les données d'entrée (POST, GET, upload).
; 60s laisse de la marge pour les uploads de fichiers volumineux.
max_input_time = 60

; Nombre maximum de variables d'entrée (GET + POST + COOKIE) par requête.
; 1000 est suffisant pour les formulaires RootWarden.
max_input_vars = 1000


; ==========================
; Data Handling
; ==========================

[Data Handling]
; Ordre de peuplement des superglobales : GET, POST, Cookie, Server
; (E = Environnement exclu volontairement pour la sécurité)
variables_order = "GPCS"

; Ordre de peuplement de $_REQUEST : GET puis POST (Cookie exclu pour éviter les collisions)
request_order = "GP"

; Initialisation différée des superglobales (légère optimisation mémoire)
auto_globals_jit = On


; ==========================
; Paths and Directories
; ==========================

[Paths]
; Chemins de recherche pour les fichiers inclus via require/include
include_path = ".:/usr/local/lib/php"

; Restreindre l'acces au systeme de fichiers aux repertoires necessaires.
; Empeche un code injecte d'acceder a /etc, /root, etc.
open_basedir = "/var/www/html:/var/www/sessions:/tmp:/usr/local/lib/php"

; Interdire l'inclusion de fichiers distants via URL (fopen wrappers).
; Protege contre les attaques RFI (Remote File Inclusion).
allow_url_include = Off

; Répertoire temporaire pour les fichiers uploadés avant traitement
sys_temp_dir = "/tmp"


; ==========================
; Output Handling
; ==========================

[Output Buffering]
; Buffer de sortie (redéclaré ici pour s'assurer qu'il est appliqué dans ce contexte)
output_buffering = 4096
; Pas de compression zlib — Apache ou le proxy s'en charge si besoin
zlib.output_compression = Off
zlib.output_compression_level = -1


; ==========================
; Realpath Caching
; ==========================
; Cache des résolutions de chemins réels (realpath()) pour accélérer les include/require.

; Taille du cache de chemins — 4096K est suffisant pour la taille du projet RootWarden
realpath_cache_size = 4096K

; Durée de validité du cache en secondes (600 = 10 minutes).
; Augmenter en production si les fichiers ne changent pas souvent.
realpath_cache_ttl = 600


; ==========================
; OPcache Configuration
; ==========================
; OPcache compile et met en cache le bytecode PHP pour éviter de ré-analyser
; les fichiers à chaque requête — gain de performance significatif.

[opcache]
; Activer OPcache (désactiver uniquement pour debugger des problèmes de cache)
opcache.enable = 1

; Mémoire allouée à OPcache en mégaoctets (128M est largement suffisant pour RootWarden)
opcache.memory_consumption = 128

; Buffer pour les chaînes internées (noms de fonctions, classes...) partagées entre scripts
opcache.interned_strings_buffer = 8

; Nombre maximum de fichiers PHP pouvant être mis en cache simultanément
opcache.max_accelerated_files = 10000

; Fréquence de vérification des modifications de fichiers (en secondes).
; 60s = vérification toutes les minutes. Mettre à 0 en développement pour désactiver le cache.
opcache.revalidate_freq = 60

; Accélération du nettoyage mémoire lors de la destruction du cache (libération rapide)
opcache.fast_shutdown = 1

; Activer OPcache aussi pour les scripts exécutés en ligne de commande (cli)
opcache.enable_cli = 1

; Vérifier les timestamps des fichiers pour détecter les modifications (nécessaire en dev)
; En production pure, mettre à Off et vider le cache manuellement après déploiement.
opcache.validate_timestamps = On

; Conserver les commentaires PHPDoc dans le cache (requis par certains frameworks et Doctrine)
opcache.save_comments = On


; ==========================
; Security
; ==========================

[Security]
; Ne pas envoyer la version PHP dans l'en-tête HTTP X-Powered-By.
; Masquer la version réduit la surface d'attaque (les exploits ciblés par version).
expose_php = Off

; Politique SameSite des cookies en mode général (Lax est moins restrictif que Strict
; mais permet les redirections GET cross-site, ex: liens dans emails).
; Note : la session utilise "Strict" (défini plus haut) — ce paramètre s'applique
; aux autres cookies créés via setcookie() sans attribut SameSite explicite.
session.cookie_samesite = "Lax"

; Liste des fonctions PHP désactivées pour raisons de sécurité.
; Ces fonctions permettent d'exécuter des commandes système arbitraires ou
; d'exposer des informations sensibles sur le serveur — elles ne sont pas
; utilisées par RootWarden et représentent un risque en cas d'injection de code.
;   exec, system, shell_exec, passthru : exécution de commandes shell
;   phpinfo                            : expose la configuration complète du serveur
;   popen, proc_open                   : ouverture de processus système
disable_functions = exec, system, shell_exec, passthru, phpinfo, popen, proc_open