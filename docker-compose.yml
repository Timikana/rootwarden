services:

  # ─────────────────────────────────────────────────────────────
  # Frontend PHP + Apache
  # ─────────────────────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: ./php/Dockerfile
    container_name: gestion_ssh_key_php
    restart: always
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - gestion_ssh_key_php_sessions:/var/www/sessions
      - ./www:/var/www/html
      - ./www/logs:/var/www/html/logs
      - ./php/php.ini:/usr/local/etc/php/php.ini
      - ./certs:/var/www/certs          # Partagé avec l'entrypoint (certs auto ou custom)
      # - /etc/localtime:/etc/localtime:ro   # Linux only — désactivé sur Windows
      # - /etc/timezone:/etc/timezone:ro    # Linux only — désactivé sur Windows
    env_file:
      - srv-docker.env
    depends_on:
      db:
        condition: service_healthy
      python:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    networks:
      rootwarden_internal:
      rootwarden_external:

  # ─────────────────────────────────────────────────────────────
  # Backend Python (Flask) — réseau interne uniquement
  # Le frontend PHP le contacte via http://python:5000 (réseau Docker).
  # Ne pas exposer ce port sur l'hôte en production.
  # Pour déboguer en local, ajoutez : ports: ["5000:5000"]
  # ─────────────────────────────────────────────────────────────
  python:
    build: ./backend
    container_name: gestion_ssh_key_python
    restart: always
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
      - ./backend/ssl:/app/ssl
      - ./backups:/app/backups                   # Dumps MySQL automatiques
      - platform_ssh_keys:/app/platform_ssh      # Keypair Ed25519 persistee
      - ./mysql/migrations:/app/migrations:ro   # Fichiers de migration SQL (lecture seule)
    working_dir: /app
    expose:
      - "5000"
    # ⚠️  NE PAS exposer le port 5000 en production !
    # Le backend Python est accessible uniquement via le réseau Docker interne (php → python:5000).
    # Décommenter UNIQUEMENT pour le debug local (API directe sans proxy PHP) :
    # ports:
    #   - "${PYTHON_PORT:-5000}:5000"
    env_file:
      - srv-docker.env
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - FLASK_APP=server.py
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:5000/test"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    networks:
      rootwarden_internal:
      rootwarden_external:

  # ─────────────────────────────────────────────────────────────
  # Base de données MySQL — réseau interne uniquement
  # Ne pas exposer le port MySQL sur l'hôte en production.
  # Pour accéder depuis un client SQL local, décommentez "ports".
  # ─────────────────────────────────────────────────────────────
  db:
    image: mysql:9.2
    container_name: gestion_ssh_key_db
    restart: always
    # ports:                            # ← Décommentez uniquement pour le débogage local
    #   - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    env_file:
      - srv-docker.env
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
    networks:
      rootwarden_internal:          # DB isolee sur reseau interne uniquement

  # ─────────────────────────────────────────────────────────────
  # Outils Composer (one-shot, ne tournent pas en continu)
  # Lancez manuellement si besoin :
  #   docker-compose run --rm composer
  #   docker-compose run --rm composer-update
  # ─────────────────────────────────────────────────────────────
  composer:
    image: composer:2
    container_name: gestion_ssh_key_composer
    working_dir: /app
    volumes:
      - ./www:/app
    command: ["composer", "install", "--no-dev", "--optimize-autoloader"]
    profiles:
      - tools
    networks:
      rootwarden_external:

  composer-update:
    image: composer:2
    container_name: gestion_ssh_key_composer_update
    working_dir: /app
    volumes:
      - ./www:/app
    command: ["composer", "update", "--no-dev", "--optimize-autoloader"]
    profiles:
      - tools
    networks:
      rootwarden_external:

  # ─────────────────────────────────────────────────────────────
  # Mock OpenCVE API (preprod uniquement)
  # Simule l'API REST OpenCVE avec des CVE réalistes pour
  # tester le scan CVE sans instance complète.
  # ─────────────────────────────────────────────────────────────
  mock-opencve:
    build: ./mock-opencve
    container_name: gestion_ssh_key_mock_opencve
    hostname: mock-opencve
    restart: unless-stopped
    profiles:
      - preprod
    expose:
      - "9090"
    networks:
      rootwarden_internal:

  # ─────────────────────────────────────────────────────────────
  # Serveur Debian de test (preprod uniquement)
  # Mini serveur SSH pour tester deploy_keys, updates, iptables, CVE scan.
  # Désactiver en production (profiles: [preprod])
  # ─────────────────────────────────────────────────────────────
  test-server:
    build: ./test-server
    container_name: gestion_ssh_key_test_server
    hostname: test-server
    restart: unless-stopped
    profiles:
      - preprod
    networks:
      rootwarden_internal:
        ipv4_address: 10.10.10.10

volumes:
  db_data:
  gestion_ssh_key_php_sessions:
  platform_ssh_keys:            # Keypair Ed25519 de la plateforme (persiste entre restarts)

networks:
  # Reseau interne : communication inter-conteneurs (db ↔ python ↔ php)
  # internal: true → pas d'acces internet, DB completement isolee
  rootwarden_internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.10.0/24
  # Reseau externe : acces internet sortant (SMTP, OpenCVE, SSH serveurs distants)
  # Seuls php et python y sont connectes
  rootwarden_external:
    driver: bridge
